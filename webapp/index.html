<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <meta name="description" content="AI Speech Translator — Speak in any language, hear the translation instantly through your earbuds.">
    <meta name="theme-color" content="#0a0a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI Translator</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ── Top Bar ─────────────────────────────── -->
    <header id="topBar">
        <div class="top-left">
            <div id="bleStatus" class="ble-indicator disconnected" title="ESP32 Connection">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M6.5 6.5l11 11L12 23V1l5.5 5.5-11 11"/>
                </svg>
            </div>
            <span id="bleText" class="ble-text">Not Connected</span>
        </div>
        <div class="top-right">
            <button id="btnConnect" class="btn-connect" aria-label="Connect ESP32">
                Connect
            </button>
            <button id="btnSettings" class="btn-icon" aria-label="Settings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- ── Main Content ────────────────────────── -->
    <main id="mainContent">
        <!-- Language Selector -->
        <div id="langBar" class="lang-bar">
            <div class="lang-select-wrap">
                <label for="sourceLang">From</label>
                <select id="sourceLang" class="lang-select">
                    <option value="auto" selected>Auto Detect</option>
                </select>
            </div>
            <button id="btnSwapLang" class="btn-swap" aria-label="Swap languages">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M7 16l-4-4m0 0l4-4m-4 4h18M17 8l4 4m0 0l-4 4m4-4H3"/>
                </svg>
            </button>
            <div class="lang-select-wrap">
                <label for="targetLang">To</label>
                <select id="targetLang" class="lang-select"></select>
            </div>
        </div>

        <!-- Status Circle -->
        <div id="statusArea" class="status-area">
            <div id="statusCircle" class="status-circle idle">
                <div class="circle-ring"></div>
                <div class="circle-ring ring-2"></div>
                <div class="circle-ring ring-3"></div>
                <div class="circle-inner">
                    <div id="statusIcon" class="status-icon">
                        <!-- Mic icon -->
                        <svg id="iconMic" width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                        <!-- Waveform (recording) -->
                        <div id="iconWave" class="wave-bars" style="display:none">
                            <span></span><span></span><span></span><span></span><span></span>
                        </div>
                        <!-- Spinner (translating) -->
                        <div id="iconSpinner" class="spinner" style="display:none"></div>
                        <!-- Speaker (playing) -->
                        <svg id="iconSpeaker" width="48" height="48" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                        </svg>
                    </div>
                </div>
            </div>
            <p id="statusText" class="status-text">Ready</p>
            <p id="statusSub" class="status-sub">Press ESP32 button or hold below to speak</p>
        </div>

        <!-- Virtual Hold Button -->
        <div class="virtual-btn-area">
            <button id="btnVirtual" class="btn-virtual" aria-label="Hold to talk">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
                <span>Hold to Talk</span>
            </button>
        </div>

        <!-- Translation Result -->
        <div id="resultCard" class="result-card hidden">
            <div class="result-section original">
                <span class="result-label" id="resultSourceLabel">English</span>
                <p id="resultOriginal" class="result-text"></p>
            </div>
            <div class="result-divider"></div>
            <div class="result-section translated">
                <span class="result-label" id="resultTargetLabel">Tamil</span>
                <p id="resultTranslated" class="result-text translated-text"></p>
            </div>
            <button id="btnReplay" class="btn-replay" aria-label="Replay audio">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                Replay
            </button>
        </div>

        <!-- History -->
        <div id="historySection" class="history-section">
            <h3 class="history-title" id="historyTitle" style="display:none">History</h3>
            <div id="historyList" class="history-list"></div>
        </div>
    </main>

    <!-- ── Settings Panel ──────────────────────── -->
    <div id="settingsPanel" class="settings-panel hidden">
        <div class="settings-backdrop"></div>
        <div class="settings-content">
            <div class="settings-header">
                <h2>Settings</h2>
                <button id="btnCloseSettings" class="btn-icon" aria-label="Close settings">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="settings-body">
                <div class="setting-group">
                    <label class="setting-label">Server URL</label>
                    <input type="text" id="settingServerUrl" class="setting-input" placeholder="https://192.168.1.x:5000">
                    <p class="setting-hint">Your PC's IP where the Python server runs</p>
                </div>
                <div class="setting-group">
                    <label class="setting-label">Whisper Model</label>
                    <p class="setting-hint">Currently using: tiny (fastest)</p>
                </div>
                <div class="setting-group">
                    <label class="setting-label">About</label>
                    <p class="setting-hint">AI Speech Translator v2.0<br>ESP32 BLE Button + Mobile App</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden audio player -->
    <audio id="audioPlayer" style="display:none"></audio>

    <script src="app.js"></script>
</body>
</html>
